<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
</head>
<body>
    <script type="module" src="model-viewer.min.js"></script>
    <style>
        model-viewer{
            width:800px; 
            height: 600px;
        }


        #lazy-load-poster{
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            background-image: url("preview.jpg");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        #button-load {
            background-image: url("dnw.png");
            background-repeat: no-repeat;
            background-size: 24px 24px;
            background-position: 6% 50%;
            background-color: #fff;
            color: black;
            cursor: pointer;
            border-radius: 6px;
            display: inline-block;
            padding: 10px 18px 9px 40px;
            font-weight: 500;
            box-shadow: 0 0 8px rgba(0, 0, 0, .2), 0 0 4px rgba(0, 0, 0, .25);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate3d(-50%, -50%, 0);
            z-index: 100;
        }

    </style>
    <model-viewer id="lazy-load" camera-controls touch-action="pan-y" reveal="manual" environment-image="neutral"
    exposure="1" alt="A 3D model of an astronaut" src="test2.glb">
        <div id="lazy-load-poster" slot="poster"></div>
                  <div id="button-load" slot="poster">Load 3D Model</div>
    </model-viewer>
<script>
                  const modelViewer = document.querySelector('#lazy-load');

                  document.querySelector('#button-load').addEventListener('click', () => {
                      modelViewer.dismissPoster();
                      modelViewer.queueRender(); 
                      
                      setTimeout(() => {
                          window.dispatchEvent(new Event('resize'));
                      }, 50);
                  }); 

        // BLENDER FIX: Run the texture scrubbing inside the model-visibility event.
        // This fires *after* Blender's packed textures break open in iOS memory.
        modelViewer.addEventListener('model-visibility', (event) => {
            if (event.detail.visible === true) {
                // Repeating the loop on a tiny continuous interval fixes the "double-click/refresh" race condition
                let textureCheckCounter = 0;
                const clearBlenderMaps = setInterval(() => {
                    if (modelViewer.model && modelViewer.model.materials) {
                        for (const material of modelViewer.model.materials) {
                            if (material.occlusionTexture) {
                                material.occlusionTexture.setTexture(null);
                            }
                        }
                    }
                    textureCheckCounter++;
                    // Stop checking after 1.5 seconds once textures settle
                    if (textureCheckCounter > 30) clearInterval(clearBlenderMaps);
                }, 50);
            }
        });
                </script>
</body>
</html>
